{% extends 'admin/base_site.html' %}
{% load i18n %}

{% block content %}
<div class="app-import">
    <h1>Import Profiles (CSV)</h1>
    <p>Upload a CSV file with headers like: name, age, height, location, bio, category, is_featured</p>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div>
            <label for="id_csv_file">CSV file</label>
            <input type="file" name="csv_file" id="id_csv_file" accept=".csv">
        </div>
        <div style="margin-top:1rem;">
            <button type="submit" class="default">Import</button>
            <a href="{% url 'admin:index' %}" class="button">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
